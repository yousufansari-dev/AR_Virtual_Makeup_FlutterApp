<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Lipstick Try-On</title>

<style>
body{
  background:linear-gradient(135deg,#0a0a0f,#1a1a27);
  color:#fff;
  font-family:Poppins,Arial;
  text-align:center;
  margin:0;
  padding:15px;
}
.container{max-width:500px;margin:auto;}
.video-box{
  position:relative;
  aspect-ratio:3/4;
  border-radius:18px;
  overflow:hidden;
  border:3px solid #ff2777;
  box-shadow:0 0 25px #ff2777aa;
}
video,canvas{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
#divider{
  position:absolute;
  top:0;bottom:0;
  width:3px;
  background:white;
  box-shadow:0 0 10px white;
}
.label{
  position:absolute;
  top:10px;
  padding:5px 10px;
  background:rgba(0,0,0,.6);
  border-radius:8px;
  font-size:13px;
}
.before{left:10px;}
.after{right:10px;}
#controls{
  margin-top:18px;
  padding:18px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(12px);
  border-radius:16px;
}
.shades{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.shade{
  cursor:pointer;
  padding:8px;
  border-radius:12px;
  background:rgba(0,0,0,.4);
  transition:.3s;
}
.shade:hover{transform:scale(1.05);}
.shade-color{
  width:36px;
  height:36px;
  border-radius:50%;
  margin:auto;
  border:2px solid #fff;
}
.shade-name{
  font-size:12px;
  margin-top:6px;
}
.slider-box{
  margin-top:12px;
  font-size:14px;
  text-align:left;
}
input[type=range]{width:100%;}
button{
  margin-top:15px;
  padding:12px 20px;
  border:none;
  border-radius:10px;
  background:#ff2777;
  color:white;
  font-size:15px;
  cursor:pointer;
}
.upload{
  margin-top:10px;
  background:#28a745;
  display:inline-block;
  padding:10px 15px;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>AI Lipstick Try-On</h2>

<div class="container">
  <div class="video-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
    <div class="label before">BEFORE</div>
    <div class="label after">AFTER</div>
    <div id="divider"></div>
  </div>
</div>

<div id="controls">
  <div class="shades">
    <div class="shade" onclick="setShade('#d6336c')">
      <div class="shade-color" style="background:#d6336c"></div>
      <div class="shade-name">Rose Pink</div>
    </div>
    <div class="shade" onclick="setShade('#8b0000')">
      <div class="shade-color" style="background:#8b0000"></div>
      <div class="shade-name">Classic Red</div>
    </div>
    <div class="shade" onclick="setShade('#ff1493')">
      <div class="shade-color" style="background:#ff1493"></div>
      <div class="shade-name">Hot Pink</div>
    </div>
    <div class="shade" onclick="setShade('#b22222')">
      <div class="shade-color" style="background:#b22222"></div>
      <div class="shade-name">Wine Red</div>
    </div>
    <div class="shade" onclick="setShade('#800080')">
      <div class="shade-color" style="background:#800080"></div>
      <div class="shade-name">Plum Purple</div>
    </div>
    <div class="shade" onclick="setShade('#c71585')">
      <div class="shade-color" style="background:#c71585"></div>
      <div class="shade-name">Berry Crush</div>
    </div>
  </div>

  <div class="slider-box">
    Opacity: <span id="opVal">0.7</span>
    <input type="range" min="0.3" max="1" step="0.05" value="0.7" id="opacity">
  </div>

  <div class="slider-box">
    Before / After
    <input type="range" min="0" max="100" value="50" id="compare">
  </div>

  <label class="upload">
    ⬆ Upload Your Photo
    <input type="file" id="uploadUser" accept="image/*" hidden>
  </label>

  <button onclick="deleteUserImage()" style="background:#dc3545;">🗑 Delete Photo</button>
  <button onclick="download()">📸 Capture & Download</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const divider = document.getElementById("divider");
const opacity = document.getElementById("opacity");
const compare = document.getElementById("compare");
const opVal = document.getElementById("opVal");

opacity.oninput = () => opVal.innerText = opacity.value;

let lipstickColor = "#d6336c";
let landmarks = null;
let userImage = null;

function setShade(c){ lipstickColor = c; }

const upper = [61,185,40,39,37,0,267,269,270,409,291];
const lower = [61,146,91,181,84,17,314,405,321,375,291];

navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}})
.then(s => video.srcObject = s);

const faceMesh = new FaceMesh({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
});
faceMesh.setOptions({
  maxNumFaces:1,
  refineLandmarks:true,
  minDetectionConfidence:0.6,
  minTrackingConfidence:0.6
});
faceMesh.onResults(r => {
  landmarks = r.multiFaceLandmarks ? r.multiFaceLandmarks[0] : null;
});

async function render(){
  if(video.readyState >= 2){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    if(!userImage) await faceMesh.send({image:video});

    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(userImage) ctx.drawImage(userImage,0,0,canvas.width,canvas.height);

    if(landmarks) drawLips();
  }
  requestAnimationFrame(render);
}

function drawLips(){
  const split = canvas.width * (compare.value/100);
  divider.style.left = split+"px";

  ctx.save();
  ctx.beginPath();
  ctx.rect(split,0,canvas.width,canvas.height);
  ctx.clip();

  ctx.globalCompositeOperation = "multiply";
  ctx.globalAlpha = opacity.value;
  ctx.filter = "blur(1px)";
  ctx.fillStyle = lipstickColor;

  ctx.beginPath();
  [...upper, ...lower.reverse()].forEach((i,idx)=>{
    const x = landmarks[i].x * canvas.width;
    const y = landmarks[i].y * canvas.height;
    idx ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
  });
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

render();

uploadUser.onchange = async e => {
  const file = e.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = async () => {
    userImage = img;
    canvas.width = img.width;
    canvas.height = img.height;
    await faceMesh.send({ image: img });
  };
  img.src = URL.createObjectURL(file);
};

function deleteUserImage(){
  userImage = null;
}

function download(){
  const t = document.createElement("canvas");
  t.width = canvas.width;
  t.height = canvas.height;
  const c = t.getContext("2d");
  if(userImage) c.drawImage(userImage,0,0);
  else c.drawImage(video,0,0);
  c.drawImage(canvas,0,0);
  const a = document.createElement("a");
  a.href = t.toDataURL("image/png");
  a.download = "AI_Lipstick.png";
  a.click();
}
</script>
</body>
</html>
